name: Weekly upstream sync

# Keeps this fork in sync with upstream (daniel-hauser/moneyman) while gating the
# production `release` branch behind review:
#   1. update-main     – pull upstream/main into `main`.
#   2. propose-release – if `main` moved ahead of `release`, open a PR
#                        main → release. Merging it triggers the Docker publish +
#                        GitHub release (see build.yml), so `release` never
#                        advances unreviewed.
#
# NOTE: opening the release PR requires "Allow GitHub Actions to create and
# approve pull requests" (Settings → Actions → General). All PRs are internal to
# this fork; nothing is pushed to upstream.

on:
  schedule:
    # Weekly, Monday 05:00 UTC
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: weekly-upstream-sync
  cancel-in-progress: false

permissions:
  contents: read

env:
  UPSTREAM_URL: https://github.com/daniel-hauser/moneyman.git
  MAIN_BRANCH: main
  RELEASE_BRANCH: release

jobs:
  update-main:
    runs-on: ubuntu-latest
    # Pushes upstream changes into main.
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull upstream into main
        run: |
          set -euo pipefail
          git remote add upstream "$UPSTREAM_URL" 2>/dev/null || git remote set-url upstream "$UPSTREAM_URL"
          git fetch --no-tags upstream "$MAIN_BRANCH"

          if git merge-base --is-ancestor upstream/"$MAIN_BRANCH" HEAD; then
            echo "✅ main already up to date with upstream — nothing to pull."
            exit 0
          fi

          echo "🆕 Pulling upstream/$MAIN_BRANCH into $MAIN_BRANCH..."
          git merge --no-edit upstream/"$MAIN_BRANCH"
          git push origin HEAD:"$MAIN_BRANCH"
          echo "✅ main updated from upstream."

  propose-release:
    needs: update-main
    runs-on: ubuntu-latest
    # Reads branches and opens the release PR.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Open PR from main to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git fetch --no-tags origin "$MAIN_BRANCH" "$RELEASE_BRANCH"
          MAIN_SHA=$(git rev-parse origin/"$MAIN_BRANCH")
          RELEASE_SHA=$(git rev-parse origin/"$RELEASE_BRANCH")
          echo "origin/$MAIN_BRANCH    = $MAIN_SHA"
          echo "origin/$RELEASE_BRANCH = $RELEASE_SHA"

          if git merge-base --is-ancestor "$MAIN_SHA" "$RELEASE_SHA"; then
            echo "✅ release already contains main — no release PR needed."
            exit 0
          fi

          if [ "$(gh pr list --base "$RELEASE_BRANCH" --head "$MAIN_BRANCH" --state open --json number --jq 'length')" -eq 0 ]; then
            gh pr create \
              --base "$RELEASE_BRANCH" \
              --head "$MAIN_BRANCH" \
              --title "chore: promote main to release" \
              --body "$(printf 'Automated PR promoting `%s` into `%s` after syncing from upstream.\n\nMerging publishes a new Docker image and GitHub release (see build.yml), so nothing reaches `%s` without review. Resolve any conflicts with fork customizations in this PR before merging.\n\n_Generated by the Weekly upstream sync workflow._' "$MAIN_BRANCH" "$RELEASE_BRANCH" "$RELEASE_BRANCH")"
          else
            echo "A $MAIN_BRANCH → $RELEASE_BRANCH PR is already open."
          fi
